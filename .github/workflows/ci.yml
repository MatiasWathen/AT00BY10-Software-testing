name: Node.js CI

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 22.19.0
      uses: actions/setup-node@v4
      with:
        node-version: '22.19.0'
    - run: npm ci
    - run: npm test
    - name: Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}